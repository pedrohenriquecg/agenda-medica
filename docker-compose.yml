services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: "demo-secret-key-change-me"
      DEBUG: "false"
      FLASK_DEBUG: "0"
      DATABASE_PATH: "/app/instance/agenda.db"
      APPOINTMENTS_API_URL: "http://127.0.0.1:5000/api/appointments"
      APPOINTMENTS_API_TIMEOUT: "5"
    volumes:
      - agenda_data:/app/instance

volumes:
  agenda_data:
